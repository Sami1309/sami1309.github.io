<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam Inloes</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cream: '#faf8f5',
          accent: '#7799cc',
        }
      }
    }
  }
</script>
</head>
<body class="font-['Helvetica_Neue',Arial,sans-serif] min-h-screen" style="background: #080c18; color: #c8d0e0;">
<div class="flex flex-col min-h-screen">

  <!-- Content -->
  <main class="flex-1 max-w-2xl mx-auto px-6 py-16">

    <!-- Hero -->
    <h1 class="text-3xl font-light mb-3 tracking-tight" style="color: #d0d8e8;">Sam Inloes</h1>
    <p class="text-sm mb-16 leading-relaxed max-w-lg" style="color: #5a6a90;">Software developer based in San Francisco.</p>

    <!-- Projects -->
    <section class="mb-14">
      <h2 class="text-xs font-bold uppercase tracking-widest mb-4" style="color: #4a5a80;">Projects</h2>
      <div class="space-y-4 text-sm leading-relaxed" style="color: #8899aa;">
        <div>
          <a href="/one-chart/" class="font-semibold transition-colors" style="color: #a0b4cc;" onmouseover="this.style.color='#7799cc'" onmouseout="this.style.color='#a0b4cc'">All Objects in the Universe</a>
          <p class="mt-1">An interactive visualization of every known object in the universe, plotted by mass vs physical radius. Based on Lineweaver &amp; Patel (2023).</p>
        </div>
      </div>
    </section>

  </main>

</div>
</body>
</html>
